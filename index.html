<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Striker: Mobile Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #020205; font-family: 'Orbitron', sans-serif; touch-action: none; }
        canvas { display: block; }
        
        #ui {
            position: absolute; top: 15px; left: 15px; color: #00f2ff;
            font-size: 18px; text-shadow: 0 0 10px #00f2ff; pointer-events: none;
        }

        /* Menu Pilihan Pesawat */
        #menu {
            position: absolute; width: 100%; height: 100%;
            background: rgba(2, 2, 5, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; color: white;
        }
        .plane-options { display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap; justify-content: center; }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #333; padding: 20px; border-radius: 15px;
            text-align: center; width: 100px; cursor: pointer; transition: 0.3s;
        }
        .card:hover { border-color: #00f2ff; background: rgba(0, 242, 255, 0.1); }
        .card h3 { font-size: 12px; margin: 10px 0; }
        .card.blue { border-color: #00d4ff; }
        .card.red { border-color: #ff4b2b; }
        .card.gold { border-color: #ffcc00; }
        
        #btn-start { display: none; margin-top: 30px; padding: 15px 40px; background: #00f2ff; border: none; border-radius: 50px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="ui">SCORE: <span id="score">0</span></div>

<div id="menu">
    <h1>PILIH PESAWAT</h1>
    <div class="plane-options">
        <div class="card blue" onclick="selectPlane('balanced', ,'#ffffff')">
            <div style="color: #fffffff; font-size: 30px;">▲</div>
            <h3>BALANCED</h3>
        </div>
        <div class="card red" onclick="selectPlane('speedster', '#ff4b2b')">
            <div style="color: #ff4b2b; font-size: 30px;">🚀</div>
            <h3>SPEED</h3>
        </div>
        <div class="card gold" onclick="selectPlane('tanker', '#ffcc00')">
            <div style="color: #ffcc00; font-size: 30px;">🛸</div>
            <h3>POWER</h3>
        </div>
    </div>
    <button id="btn-start" onclick="startGame()">START MISSION</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreElement = document.getElementById("score");
const menu = document.getElementById("menu");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let gameActive = false;
let selectedType = 'balanced';
let playerColor = '#00f2ff';
let powerLevel = 1;

// Input Posisi
let targetX = canvas.width / 2;
let targetY = canvas.height - 100;
let playerX = targetX;
let playerY = targetY;

// Handler Input (Mouse & Touch)
function handleMove(e) {
    let clientX, clientY;
    if(e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }
    targetX = clientX;
    targetY = clientY - 40; // Offset agar pesawat tidak tertutup jempol
}

window.addEventListener("mousemove", handleMove);
window.addEventListener("touchmove", (e) => {
    e.preventDefault();
    handleMove(e);
}, { passive: false });

function selectPlane(type, color) {
    selectedType = type;
    playerColor = color;
    document.querySelectorAll('.card').forEach(c => c.style.boxShadow = 'none');
    document.getElementById('btn-start').style.display = 'block';
    event.currentTarget.style.boxShadow = `0 0 20px ${color}`;
}

function startGame() {
    menu.style.display = 'none';
    gameActive = true;
    score = 0;
    scoreElement.innerText = "0";
    requestAnimationFrame(draw);
}

const bullets = [];
const enemies = [];

function spawnEnemy() {
    if (!gameActive) return;
    enemies.push({
        x: Math.random() * (canvas.width - 40),
        y: -50, w: 40, h: 40,
        speed: (selectedType === 'speedster' ? 5 : 3) + (score / 200),
        color: `hsl(${Math.random() * 360}, 70%, 50%)`
    });
}
setInterval(spawnEnemy, 800);

// Logika Tembakan
setInterval(() => {
    if (!gameActive) return;
    let bSpeed = selectedType === 'speedster' ? -18 : -12;
    
    if (selectedType === 'balanced') {
        bullets.push({ x: playerX, y: playerY - 20, vx: 0, vy: bSpeed });
    } else if (selectedType === 'speedster') {
        bullets.push({ x: playerX, y: playerY - 20, vx: 0, vy: bSpeed });
    } else if (selectedType === 'tanker') {
        bullets.push({ x: playerX - 10, y: playerY - 20, vx: -1, vy: bSpeed });
        bullets.push({ x: playerX + 10, y: playerY - 20, vx: 1, vy: bSpeed });
    }
}, 150);

function update() {
    playerX += (targetX - playerX) * 0.15;
    playerY += (targetY - playerY) * 0.15;

    bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        if (b.y < 0) bullets.splice(i, 1);
    });

    enemies.forEach((en, i) => {
        en.y += en.speed;
        bullets.forEach((b, bi) => {
            if (b.x > en.x && b.x < en.x + en.w && b.y > en.y && b.y < en.y + en.h) {
                enemies.splice(i, 1);
                bullets.splice(bi, 1);
                score += 10;
                scoreElement.innerText = score;
            }
        });
        if (en.y > canvas.height) enemies.splice(i, 1);
        let dist = Math.hypot(playerX - (en.x + en.w/2), playerY - (en.y + en.h/2));
        if (dist < 25) {
            gameActive = false;
            alert("GAME OVER! Skor: " + score);
            location.reload();
        }
    });
}

function draw() {
    if (!gameActive) return;
    ctx.fillStyle = "#020205";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Peluru
    ctx.shadowBlur = 10; ctx.shadowColor = playerColor;
    ctx.fillStyle = "white";
    bullets.forEach(b => ctx.fillRect(b.x - 2, b.y, 4, 15));

    // Musuh
    enemies.forEach(en => {
        ctx.shadowBlur = 15; ctx.shadowColor = en.color;
        ctx.fillStyle = en.color;
        ctx.fillRect(en.x, en.y, en.w, en.h);
    });

    // Pemain
    ctx.shadowBlur = 20; ctx.shadowColor = playerColor;
    ctx.fillStyle = playerColor;
    ctx.beginPath();
    if(selectedType === 'tanker') {
       ctx.arc(playerX, playerY, 20, 0, Math.PI*2);
   } else {
        ctx.moveTo(playerX, playerY - 25);
        ctx.lineTo(playerX - 20, playerY + 15);
        ctx.lineTo(playerX + 20, playerY + 15);
    }
    ctx.fill();

    update();
    requestAnimationFrame(draw);

    //ctx.drawImage(playerImg, playerX - 30, playerY - 30, 60, 60);
}
</script>
</body>
</html>
