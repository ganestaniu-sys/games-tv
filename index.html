<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Striker PRO</title>

<style>
body { margin:0; overflow:hidden; background:#020205; font-family:Orbitron; }
canvas { display:block; }

#ui {
 position:absolute; top:10px; left:10px;
 color:#00f2ff; text-shadow:0 0 10px #00f2ff;
}

#menu {
 position:absolute; width:100%; height:100%;
 display:flex; justify-content:center; align-items:center;
 background:#000; color:white; flex-direction:column;
}
button { padding:15px 30px; font-size:18px; }
</style>
</head>

<body>

<div id="menu">
<h1>NEON STRIKER</h1>
<button onclick="startGame()">START</button>
</div>

<div id="ui">
SCORE: <span id="score">0</span><br>
HIGH: <span id="highscore">0</span>
<div style="width:150px;height:8px;background:#333">
<div id="hpbar" style="height:100%;width:100%;background:#00ff88"></div>
</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// ===== DATA =====
let score=0;
let hp=100;
let highScore = localStorage.getItem("neon_high") || 0;
document.getElementById("highscore").innerText = highScore;

let player={x:canvas.width/2, y:canvas.height-80};
let bullets=[], enemies=[], boss=null;
let gameActive=false;

// ===== SOUND =====
const shootSound = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
const hitSound = new Audio("https://actions.google.com/sounds/v1/explosions/explosion.ogg");

// unlock audio
document.addEventListener("click",()=>{
 shootSound.play().then(()=>shootSound.pause());
},{once:true});

// ===== CONTROL =====
window.addEventListener("mousemove",e=>{
 player.x=e.clientX;
 player.y=e.clientY;
});
window.addEventListener("touchmove",e=>{
 player.x=e.touches[0].clientX;
 player.y=e.touches[0].clientY;
});

// ===== ENEMY IMAGE =====
let enemyImage = new Image();
enemyImage.src = "enemy.jpg";

// ===== SHOOT =====
setInterval(()=>{
 if(!gameActive) return;
 bullets.push({x:player.x,y:player.y-20});
 shootSound.currentTime=0;
 shootSound.play();
},180);

// ===== ENEMY =====
setInterval(()=>{
 if(!gameActive) return;
 enemies.push({
  x:Math.random()*(canvas.width-40),
  y:-40,
  size:40,
  speed:3+(score/200)
 });
},800);

// ===== BOSS =====
function spawnBoss(){
 boss={
  x:canvas.width/2-50,
  y:60,
  w:100,
  h:100,
  hp:200
 };
}

setInterval(()=>{
 if(score>0 && score%200===0 && !boss){
  spawnBoss();
 }
},1000);

// ===== UPDATE =====
function update(){

 bullets.forEach((b,i)=>{
  b.y-=12;
  if(b.y<0) bullets.splice(i,1);
 });

 enemies.forEach((e,i)=>{
  e.y+=e.speed;

  bullets.forEach((b,j)=>{
   if(b.x>e.x && b.x<e.x+e.size &&
      b.y>e.y && b.y<e.y+e.size){
    enemies.splice(i,1);
    bullets.splice(j,1);
    score+=10;
    hitSound.play();
   }
  });

  if(e.y>canvas.height){
   enemies.splice(i,1);
   hp-=10;
   document.getElementById("hpbar").style.width=hp+"%";
  }
 });

 // boss hit
 if(boss){
  bullets.forEach((b,i)=>{
   if(b.x>boss.x && b.x<boss.x+boss.w &&
      b.y>boss.y && b.y<boss.y+boss.h){
    boss.hp-=5;
    bullets.splice(i,1);
   }
  });

  if(boss.hp<=0){
   score+=100;
   boss=null;
  }
 }

 if(hp<=0){
  gameOver();
 }
}

// ===== DRAW =====
function draw(){
 if(!gameActive) return;

 ctx.fillStyle="#020205";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 // STAR
 ctx.fillStyle="white";
 for(let i=0;i<50;i++){
  ctx.fillRect((i*123)%canvas.width,(i*321)%canvas.height,1,1);
 }

 // PLAYER (NEON)
 ctx.shadowBlur=15;
 ctx.shadowColor="#00f2ff";
 ctx.fillStyle="#00f2ff";

 ctx.beginPath();
 ctx.moveTo(player.x,player.y-25);
 ctx.lineTo(player.x-20,player.y+15);
 ctx.lineTo(player.x-8,player.y+5);
 ctx.lineTo(player.x-8,player.y+18);
 ctx.lineTo(player.x,player.y+12);
 ctx.lineTo(player.x+8,player.y+18);
 ctx.lineTo(player.x+8,player.y+5);
 ctx.lineTo(player.x+20,player.y+15);
 ctx.fill();
 ctx.shadowBlur=0;

 // BULLET
 ctx.fillStyle="#fff";
 bullets.forEach(b=>{
  ctx.fillRect(b.x,b.y,3,10);
 });

 // ENEMY (IMAGE)
 enemies.forEach(e=>{
  if(enemyImage.complete){
   ctx.drawImage(enemyImage,e.x,e.y,e.size,e.size);
  }else{
   ctx.fillStyle="red";
   ctx.fillRect(e.x,e.y,e.size,e.size);
  }
 });

 // BOSS (NEON STYLE)
 if(boss){
  ctx.strokeStyle="#ff00ff";
  ctx.lineWidth=3;
  ctx.strokeRect(boss.x,boss.y,boss.w,boss.h);

  ctx.fillStyle="red";
  ctx.fillRect(20,40,200,10);
  ctx.fillStyle="lime";
  ctx.fillRect(20,40,boss.hp,10);
 }

 update();

 document.getElementById("score").innerText=score;

 requestAnimationFrame(draw);
}

// ===== GAME OVER =====
function gameOver(){
 gameActive=false;

 if(score>highScore){
  localStorage.setItem("neon_high",score);
 }

 alert("GAME OVER\nScore: "+score);
 location.reload();
}

// ===== START =====
function startGame(){
 document.getElementById("menu").style.display="none";
 gameActive=true;
 draw();
}
</script>

</body>
</html>
