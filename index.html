<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// ===== DATA =====
let player={x:canvas.width/2,y:canvas.height-80};
let bullets=[], enemies=[], bossBullets=[], particles=[];
let boss=null;

let score=0, hp=100, level=1;
let coins=0;
let gameActive=false;

// ===== CONTROL =====
window.addEventListener("mousemove",e=>{
 player.x=e.clientX;
 player.y=e.clientY;
});
window.addEventListener("touchmove",e=>{
 player.x=e.touches[0].clientX;
 player.y=e.touches[0].clientY;
});

// ===== IMAGE =====
let enemyImage=new Image();
enemyImage.src="enemy.jpg";

// ===== TIMER (NO MORE SETINTERVAL 💀) =====
let shootTimer=0;
let enemyTimer=0;
let bossTimer=0;

// ===== MAIN LOOP =====
function gameLoop(){
 if(!gameActive) return;

 update();
 draw();

 requestAnimationFrame(gameLoop);
}

// ===== UPDATE =====
function update(){

 shootTimer++;
 enemyTimer++;
 bossTimer++;

 // SHOOT
 if(shootTimer>10){
  shootTimer=0;

  if(bullets.length<40){
   bullets.push({x:player.x,y:player.y});
  }
 }

 // ENEMY SPAWN
 if(enemyTimer>40){
  enemyTimer=0;

  if(enemies.length<15){
   enemies.push({
    x:Math.random()*canvas.width,
    y:-40,
    speed:2+Math.random()*2
   });
  }
 }

 // BOSS SPAWN
 if(score>0 && score%200===0 && !boss){
  boss={x:canvas.width/2-50,y:50,w:100,h:100,hp:100};
 }

 // BULLETS
 for(let i=bullets.length-1;i>=0;i--){
  let b=bullets[i];
  b.y-=10;

  if(b.y<0) bullets.splice(i,1);
 }

 // ENEMIES
 for(let i=enemies.length-1;i>=0;i--){
  let e=enemies[i];
  e.y+=e.speed;

  // collision
  for(let j=bullets.length-1;j>=0;j--){
   let b=bullets[j];

   if(b.x>e.x && b.x<e.x+40 && b.y>e.y && b.y<e.y+40){
    enemies.splice(i,1);
    bullets.splice(j,1);
    score+=10;

    // particle simple
    for(let k=0;k<3;k++){
     particles.push({x:e.x,y:e.y,vx:Math.random()*2-1,vy:Math.random()*2-1,life:10});
    }
    break;
   }
  }

  if(e.y>canvas.height){
   enemies.splice(i,1);
   hp-=5;
  }
 }

 // BOSS
 if(boss){
  for(let i=bullets.length-1;i>=0;i--){
   let b=bullets[i];

   if(b.x>boss.x && b.x<boss.x+boss.w &&
      b.y>boss.y && b.y<boss.y+boss.h){

    boss.hp-=2;
    bullets.splice(i,1);
   }
  }

  if(Math.random()<0.02){
   bossBullets.push({x:boss.x+50,y:boss.y});
  }

  if(boss.hp<=0){
   boss=null;
   score+=100;
  }
 }

 // BOSS BULLET
 for(let i=bossBullets.length-1;i>=0;i--){
  let b=bossBullets[i];
  b.y+=4;

  if(Math.abs(b.x-player.x)<20 && Math.abs(b.y-player.y)<20){
   hp-=10;
   bossBullets.splice(i,1);
  }

  if(b.y>canvas.height) bossBullets.splice(i,1);
 }

 // PARTICLES
 for(let i=particles.length-1;i>=0;i--){
  let p=particles[i];
  p.x+=p.vx;
  p.y+=p.vy;
  p.life--;

  if(p.life<=0) particles.splice(i,1);
 }

 // LIMIT GLOBAL (ANTI FREEZE 🔥)
 if(particles.length>50) particles.splice(0,10);
 if(bossBullets.length>20) bossBullets.splice(0,5);

 // GAME OVER
 if(hp<=0){
  alert("GAME OVER\nScore:"+score);
  location.reload();
 }
}

// ===== DRAW =====
function draw(){
 ctx.fillStyle="#020205";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 // player
 ctx.fillStyle="#00f2ff";
 ctx.beginPath();
 ctx.moveTo(player.x,player.y-20);
 ctx.lineTo(player.x-15,player.y+15);
 ctx.lineTo(player.x+15,player.y+15);
 ctx.fill();

 // bullets
 ctx.fillStyle="white";
 bullets.forEach(b=>ctx.fillRect(b.x,b.y,3,8));

 // enemies
 enemies.forEach(e=>{
  if(enemyImage.complete){
   ctx.drawImage(enemyImage,e.x,e.y,40,40);
  } else {
   ctx.fillStyle="red";
   ctx.fillRect(e.x,e.y,40,40);
  }
 });

 // boss
 if(boss){
  ctx.strokeStyle="purple";
  ctx.strokeRect(boss.x,boss.y,boss.w,boss.h);
 }

 // boss bullets
 ctx.fillStyle="red";
 bossBullets.forEach(b=>ctx.fillRect(b.x,b.y,4,10));

 // particles
 ctx.fillStyle="orange";
 particles.forEach(p=>ctx.fillRect(p.x,p.y,2,2));

 // UI
 ctx.fillStyle="white";
 ctx.fillText("Score: "+score,20,30);
 ctx.fillText("HP: "+hp,20,50);
}

// ===== START =====
function startGame(){
 document.getElementById("menu").style.display="none";
 gameActive=true;
 gameLoop();
}
</script>
