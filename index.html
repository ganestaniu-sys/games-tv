<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Striker PRO</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Orbitron; }
#ui { position:absolute; top:10px; left:10px; color:#0ff; }
#hpbar { width:200px; height:10px; background:#333; margin-top:5px; }
#hp { height:100%; background:#0f0; width:100%; }
#menu {
 position:absolute; width:100%; height:100%;
 background:#000; display:flex; justify-content:center; align-items:center;
 color:white; flex-direction:column;
}
button { padding:15px 30px; font-size:18px; }
</style>
</head>

<body>

<div id="menu">
<h1>NEON STRIKER PRO</h1>
<button onclick="startGame()">START</button>
</div>

<div id="ui">
Score: <span id="score">0</span><br>
High Score: <span id="high">0</span>
<div id="hpbar"><div id="hp"></div></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let score=0;
let hp=100;
let highScore = localStorage.getItem("highscore") || 0;
document.getElementById("high").innerText = highScore;

let player = {x:canvas.width/2, y:canvas.height-80};
let bullets=[], enemies=[], explosions=[];
let boss=null;
let gameActive=false;

// ===== SOUND =====
const laser = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
const boom = new Audio("https://actions.google.com/sounds/v1/explosions/explosion.ogg");

// ===== CONTROL =====
window.addEventListener("mousemove", e=>{
 player.x=e.clientX;
 player.y=e.clientY;
});

// ===== SHOOT =====
setInterval(()=>{
 if(!gameActive) return;
 bullets.push({x:player.x, y:player.y-20});
 laser.currentTime=0;
 laser.play();
},200);

// ===== ENEMY =====
function spawnEnemy(){
 if(!gameActive) return;
 enemies.push({
  x:Math.random()*canvas.width,
  y:-50,
  size:40,
  speed:3
 });
}
setInterval(spawnEnemy,800);

// ===== BOSS =====
function spawnBoss(){
 boss = {
  x:canvas.width/2,
  y:100,
  hp:200
 };
}
setInterval(()=>{
 if(score>0 && score%200==0 && !boss){
  spawnBoss();
 }
},1000);

// ===== UPDATE =====
function update(){
 bullets.forEach((b,i)=>{
  b.y-=10;
  if(b.y<0) bullets.splice(i,1);
 });

 enemies.forEach((e,i)=>{
  e.y+=e.speed;

  bullets.forEach((b,j)=>{
   if(b.x<e.x+e.size && b.x>e.x &&
      b.y<e.y+e.size && b.y>e.y){
    enemies.splice(i,1);
    bullets.splice(j,1);
    score+=10;
    boom.play();
    explosions.push({x:e.x,y:e.y});
   }
  });

  if(e.y>canvas.height){
   enemies.splice(i,1);
   hp-=10;
  }
 });

 // BOSS HIT
 if(boss){
  bullets.forEach((b,i)=>{
   if(b.x>boss.x-50 && b.x<boss.x+50 &&
      b.y>boss.y-50 && b.y<boss.y+50){
    boss.hp-=5;
    bullets.splice(i,1);
   }
  });

  if(boss.hp<=0){
   score+=100;
   boss=null;
  }
 }

 if(hp<=0){
  gameOver();
 }
}

// ===== DRAW =====
function draw(){
 if(!gameActive) return;

 ctx.fillStyle="black";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 // PLAYER
 ctx.fillStyle="#0ff";
 ctx.beginPath();
 ctx.moveTo(player.x, player.y-20);
 ctx.lineTo(player.x-15, player.y+15);
 ctx.lineTo(player.x+15, player.y+15);
 ctx.fill();

 // BULLET
 ctx.fillStyle="white";
 bullets.forEach(b=>{
  ctx.fillRect(b.x,b.y,3,10);
 });

 // ENEMY
 ctx.fillStyle="red";
 enemies.forEach(e=>{
  ctx.fillRect(e.x,e.y,e.size,e.size);
 });

 // BOSS
 if(boss){
  ctx.fillStyle="purple";
  ctx.fillRect(boss.x-50,boss.y-50,100,100);

  // HP BAR BOSS
  ctx.fillStyle="red";
  ctx.fillRect(20,40,200,10);
  ctx.fillStyle="green";
  ctx.fillRect(20,40,boss.hp,10);
 }

 // EXPLOSION
 ctx.fillStyle="orange";
 explosions.forEach((ex,i)=>{
  ctx.beginPath();
  ctx.arc(ex.x,ex.y,20,0,Math.PI*2);
  ctx.fill();
  explosions.splice(i,1);
 });

 update();

 document.getElementById("score").innerText=score;
 document.getElementById("hp").style.width=hp+"%";

 requestAnimationFrame(draw);
}

// ===== GAME OVER =====
function gameOver(){
 gameActive=false;

 if(score>highScore){
  localStorage.setItem("highscore", score);
 }

 alert("GAME OVER\nScore: "+score);
 location.reload();
}

// ===== START =====
function startGame(){
 document.getElementById("menu").style.display="none";
 gameActive=true;
 draw();
}
</script>

</body>
</html>
