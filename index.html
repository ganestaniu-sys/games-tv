<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Striker FINAL</title>

<style>
body { margin:0; overflow:hidden; background:#020205; font-family:Orbitron; }
canvas { display:block; }

#ui {
 position:absolute; top:10px; left:10px;
 color:#00f2ff; text-shadow:0 0 10px #00f2ff;
 z-index:20;
}

#menu {
 position:absolute; width:100%; height:100%;
 display:flex; justify-content:center; align-items:center;
 background:black; color:white; flex-direction:column;
 z-index:10;
}

button { padding:10px 20px; margin:5px; }
</style>
</head>

<body>

<div id="menu">
<h1>NEON STRIKER FINAL</h1>
<button onclick="startGame()">START</button>
<button onclick="buyWeapon()">UPGRADE SENJATA (50)</button>
</div>

<div id="ui">
SCORE: <span id="score">0</span><br>
HIGH: <span id="highscore">0</span><br>
COINS: <span id="coins">0</span><br>
LEVEL: <span id="level">1</span>
<div style="width:150px;height:8px;background:#333">
<div id="hpbar" style="height:100%;width:100%;background:#00ff88"></div>
</div>
<button onclick="paused=!paused">PAUSE</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

// ===== DATA =====
let score=0;
let hp=100;
let coins = localStorage.getItem("coins") || 0;
let weaponLevel = localStorage.getItem("weapon") || 1;
let highScore = localStorage.getItem("neon_high") || 0;

document.getElementById("highscore").innerText = highScore;
document.getElementById("coins").innerText = coins;

let level=1;
let paused=false;
let gameActive=false;

let player={x:canvas.width/2,y:canvas.height-80};
let bullets=[], enemies=[], boss=null, bossBullets=[];
let particles=[], stars=[], powerUps=[];

// ===== SOUND =====
const shootSound=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
const hitSound=new Audio("https://actions.google.com/sounds/v1/explosions/explosion.ogg");
const bgm=new Audio("https://actions.google.com/sounds/v1/ambiences/space_ambience.ogg");
bgm.loop=true;

// unlock audio
document.addEventListener("click",()=>{
 shootSound.play().then(()=>shootSound.pause());
},{once:true});

// ===== STAR =====
for(let i=0;i<80;i++){
 stars.push({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  speed:Math.random()*2+1
 });
}

// ===== CONTROL =====
window.addEventListener("mousemove",e=>{
 player.x=e.clientX;
 player.y=e.clientY;
});
window.addEventListener("touchmove",e=>{
 player.x=e.touches[0].clientX;
 player.y=e.touches[0].clientY;
});

// ===== ENEMY IMAGE =====
let enemyImage=new Image();
enemyImage.src="enemy.jpg";

// ===== SHOOT =====
setInterval(()=>{
 if(!gameActive || paused) return;

 if (weaponLevel == 1) {
  bullets.push({x:player.x,y:player.y-20,vx:0});
 }
 else if (weaponLevel == 2) {
  bullets.push({x:player.x,y:player.y-20,vx:0});
  bullets.push({x:player.x-10,y:player.y-20,vx:-2});
  bullets.push({x:player.x+10,y:player.y-20,vx:2});
 }
 else {
  bullets.push({x:player.x,y:player.y-20,vx:0});
  bullets.push({x:player.x-15,y:player.y-20,vx:-3});
  bullets.push({x:player.x+15,y:player.y-20,vx:3});
 }

 shootSound.currentTime=0;
 shootSound.play();

},180);

// ===== ENEMY =====
setInterval(()=>{
 if(!gameActive || paused) return;
 enemies.push({
  x:Math.random()*canvas.width,
  y:-40,
  size:40,
  speed:3,
  zigzag:Math.random()*2+1
 });
},800);

// ===== BOSS =====
function spawnBoss(){
 boss={x:canvas.width/2-50,y:60,w:100,h:100,hp:200};
}

setInterval(()=>{
 if(score>0 && score%200===0 && !boss){
  spawnBoss();
 }
},1000);

// ===== UPDATE =====
function update(){
 if(paused) return;

 level=Math.floor(score/100)+1;
 document.getElementById("level").innerText=level;

 bullets.forEach((b,i)=>{
  b.y-=10;
  b.x+=b.vx||0;
  if(b.y<0) bullets.splice(i,1);
 });

 enemies.forEach((e,i)=>{
  e.y+=e.speed;
  e.x+=Math.sin(e.y*0.05)*e.zigzag;

  bullets.forEach((b,j)=>{
   if(b.x>e.x && b.x<e.x+40 && b.y>e.y && b.y<e.y+40){
    enemies.splice(i,1);
    bullets.splice(j,1);
    score+=10;
    coins+=5;
    hitSound.play();

    // particle
    for(let k=0;k<10;k++){
     particles.push({
      x:e.x,y:e.y,
      vx:(Math.random()-0.5)*5,
      vy:(Math.random()-0.5)*5,
      life:20
     });
    }
   }
  });

  if(e.y>canvas.height){
   enemies.splice(i,1);
   hp-=10;
  }
 });

 // boss
 if(boss){
  bullets.forEach((b,i)=>{
   if(b.x>boss.x && b.x<boss.x+boss.w &&
      b.y>boss.y && b.y<boss.y+boss.h){
    boss.hp-=5;
    bullets.splice(i,1);
   }
  });

  if(Math.random()<0.03){
   bossBullets.push({x:boss.x+50,y:boss.y});
  }

  if(boss.hp<=0){
   score+=100;
   boss=null;
  }
 }

 bossBullets.forEach((b,i)=>{
  b.y+=5;
  if(Math.abs(b.x-player.x)<20 && Math.abs(b.y-player.y)<20){
   hp-=20;
   bossBullets.splice(i,1);
  }
 });

 particles.forEach((p,i)=>{
  p.x+=p.vx;
  p.y+=p.vy;
  p.life--;
  if(p.life<=0) particles.splice(i,1);
 });

 if(hp<=0){
  gameOver();
 }
}

// ===== DRAW =====
function draw(){
 if(!gameActive) return;

 ctx.fillStyle="#020205";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 // stars
 ctx.fillStyle="white";
 stars.forEach(s=>{
  s.y+=s.speed;
  if(s.y>canvas.height){
   s.y=0; s.x=Math.random()*canvas.width;
  }
  ctx.fillRect(s.x,s.y,2,2);
 });

 // player
 ctx.shadowBlur=15;
 ctx.shadowColor="#00f2ff";
 ctx.fillStyle="#00f2ff";

 ctx.beginPath();
 ctx.moveTo(player.x,player.y-25);
 ctx.lineTo(player.x-20,player.y+15);
 ctx.lineTo(player.x+20,player.y+15);
 ctx.fill();
 ctx.shadowBlur=0;

 // bullets
 ctx.fillStyle="white";
 bullets.forEach(b=>{
  ctx.fillRect(b.x,b.y,3,10);
 });

 // enemies
 enemies.forEach(e=>{
  if(enemyImage.complete){
   ctx.drawImage(enemyImage,e.x,e.y,40,40);
  } else {
   ctx.fillStyle="red";
   ctx.fillRect(e.x,e.y,40,40);
  }
 });

 // boss
 if(boss){
  ctx.strokeStyle="#ff00ff";
  ctx.strokeRect(boss.x,boss.y,boss.w,boss.h);
 }

 // boss bullets
 ctx.fillStyle="red";
 bossBullets.forEach(b=>{
  ctx.fillRect(b.x,b.y,5,10);
 });

 // particles
 ctx.fillStyle="orange";
 particles.forEach(p=>{
  ctx.fillRect(p.x,p.y,3,3);
 });

 update();

 document.getElementById("score").innerText=score;
 document.getElementById("coins").innerText=coins;
 document.getElementById("hpbar").style.width=hp+"%";

 requestAnimationFrame(draw);
}

// ===== SHOP =====
function buyWeapon(){
 if(coins>=50){
  coins-=50;
  weaponLevel++;
  localStorage.setItem("weapon",weaponLevel);
  alert("Upgrade berhasil!");
 }
}

// ===== GAME OVER =====
function gameOver(){
 gameActive=false;

 localStorage.setItem("coins",coins);

 if(score>highScore){
  localStorage.setItem("neon_high",score);
 }

 alert("GAME OVER\nScore: "+score);
 location.reload();
}

// ===== START =====
function startGame(){
 document.getElementById("menu").style.display="none";
 gameActive=true;
 bgm.play();
 draw();
}
</script>

</body>
</html>
