<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Striker PRO MAX</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
#ui { position:absolute; top:10px; left:10px; color:#0ff; }
#hpwrap { width:150px; height:8px; background:#333; }
#hp { height:100%; width:100%; background:#0f0; }

#menu{
 position:absolute; width:100%; height:100%;
 display:flex; justify-content:center; align-items:center;
 background:black; color:white; flex-direction:column;
}
button{ padding:15px 30px; font-size:18px; }
</style>
</head>

<body>

<div id="menu">
<h1>NEON STRIKER PRO MAX</h1>
<button onclick="startGame()">START</button>
</div>

<div id="ui">
Score: <span id="score">0</span><br>
High: <span id="high">0</span>
<div id="hpwrap"><div id="hp"></div></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

// ===== DATA =====
let score=0;
let hp=100;
let high = localStorage.getItem("hs") || 0;
document.getElementById("high").innerText = high;

let player={x:canvas.width/2, y:canvas.height-80};
let bullets=[], enemies=[], boss=null;
let gameActive=false;

// ===== SOUND =====
const laser=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
const boom=new Audio("https://actions.google.com/sounds/v1/explosions/explosion.ogg");

// unlock audio
document.addEventListener("click",()=>{
 laser.play().then(()=>laser.pause());
},{once:true});

// ===== CONTROL =====
window.addEventListener("mousemove",e=>{
 player.x=e.clientX;
 player.y=e.clientY;
});
window.addEventListener("touchmove",e=>{
 player.x=e.touches[0].clientX;
 player.y=e.touches[0].clientY;
});

// ===== BENDERA MUSUH =====
const flags=["🇮🇩","🇺🇸","🇯🇵","🇰🇷","🇨🇳","🇧🇷","🇩🇪","🇫🇷","🇬🇧"];

// ===== SHOOT =====
setInterval(()=>{
 if(!gameActive) return;
 bullets.push({x:player.x,y:player.y});
 laser.currentTime=0;
 laser.play();
},200);

// ===== ENEMY =====
setInterval(()=>{
 if(!gameActive) return;
 enemies.push({
  x:Math.random()*canvas.width,
  y:-40,
  size:40,
  flag: flags[Math.floor(Math.random()*flags.length)],
  speed:3
 });
},800);

// ===== BOSS =====
function spawnBoss(){
 boss={
  x:canvas.width/2,
  y:100,
  hp:300,
  flag:"🌍"
 };
}

setInterval(()=>{
 if(score>0 && score%200==0 && !boss){
  spawnBoss();
 }
},1000);

// ===== UPDATE =====
function update(){

 bullets.forEach((b,i)=>{
  b.y-=10;
  if(b.y<0) bullets.splice(i,1);
 });

 enemies.forEach((e,i)=>{
  e.y+=e.speed;

  bullets.forEach((b,j)=>{
   if(b.x>e.x && b.x<e.x+40 && b.y>e.y && b.y<e.y+40){
    enemies.splice(i,1);
    bullets.splice(j,1);
    score+=10;
    boom.play();
   }
  });

  if(e.y>canvas.height){
   enemies.splice(i,1);
   hp-=10;
  }
 });

 // boss
 if(boss){
  bullets.forEach((b,i)=>{
   if(b.x>boss.x-50 && b.x<boss.x+50 &&
      b.y>boss.y-50 && b.y<boss.y+50){
    boss.hp-=5;
    bullets.splice(i,1);
   }
  });

  if(boss.hp<=0){
   score+=200;
   boss=null;
  }
 }

 if(hp<=0){
  gameOver();
 }
}

// ===== DRAW =====
function draw(){
 if(!gameActive) return;

 ctx.fillStyle="black";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 // PLAYER PESAWAT
 ctx.fillStyle="#0ff";
 ctx.beginPath();
 ctx.moveTo(player.x,player.y-25);
 ctx.lineTo(player.x-20,player.y+15);
 ctx.lineTo(player.x-5,player.y+5);
 ctx.lineTo(player.x+5,player.y+5);
 ctx.lineTo(player.x+20,player.y+15);
 ctx.fill();

 // BULLET
 ctx.fillStyle="white";
 bullets.forEach(b=>{
  ctx.fillRect(b.x,b.y,3,10);
 });

 // ENEMY (BENDERA)
 ctx.font="30px Arial";
 enemies.forEach(e=>{
  ctx.fillText(e.flag,e.x,e.y);
 });

 // BOSS
 if(boss){
  ctx.font="80px Arial";
  ctx.fillText(boss.flag,boss.x-40,boss.y);

  // HP boss
  ctx.fillStyle="red";
  ctx.fillRect(20,40,200,10);
  ctx.fillStyle="lime";
  ctx.fillRect(20,40,boss.hp/1.5,10);
 }

 update();

 document.getElementById("score").innerText=score;
 document.getElementById("hp").style.width=hp+"%";

 requestAnimationFrame(draw);
}

// ===== GAME OVER =====
function gameOver(){
 gameActive=false;

 if(score>high){
  localStorage.setItem("hs",score);
 }

 alert("GAME OVER\nScore: "+score);
 location.reload();
}

// ===== START =====
function startGame(){
 document.getElementById("menu").style.display="none";
 gameActive=true;
 draw();
}
</script>

</body>
</html>
