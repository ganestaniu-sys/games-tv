<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

// ===== DATA =====
let score=0;
let hp=100;
let coins = Number(localStorage.getItem("coins")) || 0;
let weaponLevel = Number(localStorage.getItem("weapon")) || 1;
let highScore = Number(localStorage.getItem("neon_high")) || 0;

let level=1;
let paused=false;
let gameActive=false;

let player={x:canvas.width/2,y:canvas.height-80};
let bullets=[], enemies=[], boss=null, bossBullets=[];
let particles=[], stars=[];

let lastBossScore = 0;

// ===== SOUND (FIX SPAM) =====
const shootSound=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
const hitSound=new Audio("https://actions.google.com/sounds/v1/explosions/explosion.ogg");

function playShoot(){
 if(shootSound.paused){
  shootSound.currentTime=0;
  shootSound.play();
 }
}

// ===== STAR =====
for(let i=0;i<60;i++){
 stars.push({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  speed:Math.random()*2+1
 });
}

// ===== CONTROL =====
window.addEventListener("mousemove",e=>{
 player.x=e.clientX;
 player.y=e.clientY;
});
window.addEventListener("touchmove",e=>{
 player.x=e.touches[0].clientX;
 player.y=e.touches[0].clientY;
});

// ===== ENEMY IMAGE =====
let enemyImage=new Image();
enemyImage.src="enemy.jpg";

// ===== SHOOT =====
setInterval(()=>{
 if(!gameActive || paused) return;

 if (bullets.length > 50) return; // LIMIT

 if (weaponLevel == 1) {
  bullets.push({x:player.x,y:player.y-20,vx:0});
 }
 else if (weaponLevel == 2) {
  bullets.push({x:player.x,y:player.y-20,vx:0});
  bullets.push({x:player.x-10,y:player.y-20,vx:-2});
  bullets.push({x:player.x+10,y:player.y-20,vx:2});
 }
 else {
  bullets.push({x:player.x,y:player.y-20,vx:0});
  bullets.push({x:player.x-15,y:player.y-20,vx:-3});
  bullets.push({x:player.x+15,y:player.y-20,vx:3});
 }

 playShoot();

},180);

// ===== ENEMY =====
setInterval(()=>{
 if(!gameActive || paused) return;

 if(enemies.length > 20) return; // LIMIT

 enemies.push({
  x:Math.random()*canvas.width,
  y:-40,
  speed:3,
  zigzag:Math.random()*2+1
 });
},800);

// ===== BOSS =====
function spawnBoss(){
 boss={x:canvas.width/2-50,y:60,w:100,h:100,hp:200};
}

function checkBoss(){
 if(score >= lastBossScore + 200){
  spawnBoss();
  lastBossScore = score;
 }
}

// ===== UPDATE =====
function update(){
 if(paused) return;

 level=Math.floor(score/100)+1;

 // bullets update (AMAN)
 for(let i=bullets.length-1;i>=0;i--){
  let b=bullets[i];
  b.y-=10;
  b.x+=b.vx||0;

  if(b.y<0) bullets.splice(i,1);
 }

 // enemies update (AMAN)
 for(let i=enemies.length-1;i>=0;i--){
  let e=enemies[i];

  e.y+=e.speed;
  e.x+=Math.sin(e.y*0.05)*e.zigzag;

  for(let j=bullets.length-1;j>=0;j--){
   let b=bullets[j];

   if(b.x>e.x && b.x<e.x+40 && b.y>e.y && b.y<e.y+40){

    enemies.splice(i,1);
    bullets.splice(j,1);

    score+=10;
    coins+=5;

    hitSound.currentTime=0;
    hitSound.play();

    // particle limit
    for(let k=0;k<5;k++){
     particles.push({
      x:e.x,y:e.y,
      vx:(Math.random()-0.5)*4,
      vy:(Math.random()-0.5)*4,
      life:15
     });
    }

    break;
   }
  }

  if(e.y>canvas.height){
   enemies.splice(i,1);
   hp-=10;
  }
 }

 // boss logic
 checkBoss();

 if(boss){
  for(let i=bullets.length-1;i>=0;i--){
   let b=bullets[i];

   if(b.x>boss.x && b.x<boss.x+boss.w &&
      b.y>boss.y && b.y<boss.y+boss.h){

    boss.hp-=5;
    bullets.splice(i,1);
   }
  }

  if(Math.random()<0.02){
   bossBullets.push({x:boss.x+50,y:boss.y});
  }

  if(boss.hp<=0){
   score+=100;
   boss=null;
  }
 }

 // boss bullet
 for(let i=bossBullets.length-1;i>=0;i--){
  let b=bossBullets[i];
  b.y+=5;

  if(Math.abs(b.x-player.x)<20 && Math.abs(b.y-player.y)<20){
   hp-=20;
   bossBullets.splice(i,1);
  }

  if(b.y>canvas.height){
   bossBullets.splice(i,1);
  }
 }

 // particles limit
 for(let i=particles.length-1;i>=0;i--){
  let p=particles[i];
  p.x+=p.vx;
  p.y+=p.vy;
  p.life--;

  if(p.life<=0) particles.splice(i,1);
 }

 if(particles.length > 100) particles.splice(0,10);

 if(hp<=0) gameOver();
}

// ===== DRAW =====
function draw(){
 if(!gameActive) return;

 ctx.fillStyle="#020205";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 // stars
 ctx.fillStyle="white";
 stars.forEach(s=>{
  s.y+=s.speed;
  if(s.y>canvas.height){
   s.y=0; s.x=Math.random()*canvas.width;
  }
  ctx.fillRect(s.x,s.y,2,2);
 });

 // player
 ctx.fillStyle="#00f2ff";
 ctx.beginPath();
 ctx.moveTo(player.x,player.y-25);
 ctx.lineTo(player.x-20,player.y+15);
 ctx.lineTo(player.x+20,player.y+15);
 ctx.fill();

 // bullets
 ctx.fillStyle="white";
 bullets.forEach(b=>ctx.fillRect(b.x,b.y,3,10));

 // enemies
 enemies.forEach(e=>{
  if(enemyImage.complete){
   ctx.drawImage(enemyImage,e.x,e.y,40,40);
  } else {
   ctx.fillRect(e.x,e.y,40,40);
  }
 });

 // boss
 if(boss){
  ctx.strokeStyle="#ff00ff";
  ctx.strokeRect(boss.x,boss.y,boss.w,boss.h);
 }

 // boss bullets
 ctx.fillStyle="red";
 bossBullets.forEach(b=>ctx.fillRect(b.x,b.y,5,10));

 // particles
 ctx.fillStyle="orange";
 particles.forEach(p=>ctx.fillRect(p.x,p.y,3,3));

 update();

 document.getElementById("score").innerText=score;
 document.getElementById("coins").innerText=coins;
 document.getElementById("level").innerText=level;
 document.getElementById("hpbar").style.width=hp+"%";

 requestAnimationFrame(draw);
}

// ===== GAME =====
function startGame(){
 document.getElementById("menu").style.display="none";
 gameActive=true;
 draw();
}

function gameOver(){
 gameActive=false;

 localStorage.setItem("coins",coins);

 if(score>highScore){
  localStorage.setItem("neon_high",score);
 }

 alert("GAME OVER\nScore: "+score);
 location.reload();
}
</script>
